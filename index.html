 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Handmade Bag Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #1a161f; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .product-card img { border-radius: 16px; width: 100%; aspect-ratio: 1/1.2; object-fit: cover; background-color: #2d2833; }
        .nav-item.active { color: white !important; }
        .page-content { display: none; }
        .page-content.active { display: block; }
        .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="pb-24">

    <div class="p-4 sticky top-0 bg-[#1a161f]/95 backdrop-blur-md z-50">
        <div class="flex items-center bg-[#2d2833] rounded-full px-4 py-2.5 border border-gray-700/30">
            <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            <input type="text" placeholder="Search for something special" class="bg-transparent border-none focus:outline-none ml-3 text-[15px] w-full text-gray-200">
        </div>
    </div>

    <div id="homePage" class="page-content active">
        <div class="px-5 py-2"><h2 class="text-[18px] font-semibold tracking-tight">Inspiration at your fingertips</h2></div>
        <div class="grid grid-cols-2 gap-4 px-4 mt-2" id="bagGrid"></div>
    </div>

    <div id="shopPage" class="page-content p-5 text-center mt-10">
        <h2 class="text-xl font-bold mb-2">Our Collections</h2>
        <div class="mt-10 p-10 border border-dashed border-gray-700 rounded-xl text-gray-500">New Collections coming soon!</div>
    </div>

    <div id="favsPage" class="page-content p-5">
        <h2 class="text-xl font-bold mb-4 text-center">Your Favorites</h2>
        <div id="favList" class="grid grid-cols-2 gap-4">
            </div>
        <div id="emptyFav" class="text-center text-gray-500 mt-10">Items you ❤️ will appear here.</div>
    </div>

    <div id="cartPage" class="page-content p-5 text-center mt-10">
        <h2 class="text-xl font-bold mb-4">Shopping Cart</h2>
        <p class="text-gray-400 mb-6">Your cart is currently empty.</p>
        <button onclick="showPage('homePage', document.getElementById('homeBtn'))" class="bg-pink-600 px-8 py-3 rounded-full font-bold text-sm">Start Shopping</button>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-black/95 backdrop-blur-xl border-t border-gray-800 flex justify-around items-center py-3 z-50 text-gray-500">
        <div id="homeBtn" onclick="showPage('homePage', this)" class="nav-item active flex flex-col items-center cursor-pointer"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg><span class="text-[10px] mt-1">Home</span></div>
        <div onclick="showPage('shopPage', this)" class="nav-item flex flex-col items-center cursor-pointer"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg><span class="text-[10px] mt-1">Shop</span></div>
        <div onclick="showPage('favsPage', this)" class="nav-item flex flex-col items-center cursor-pointer"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg><span class="text-[10px] mt-1">Favs</span></div>
        <div onclick="showPage('cartPage', this)" class="nav-item flex flex-col items-center cursor-pointer"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg><span class="text-[10px] mt-1">Cart</span></div>
    </div>

    <script>
        const bagData = [
            { id: 1, name: "Crochet Pattern Crochet Tote Bag", price: "396" },
            { id: 2, name: "Crochet Pattern Furry Bag", price: "463" },
            { id: 3, name: "Crochet Pattern Nuvol Bag", price: "463" },
            { id: 4, name: "Crochet Pattern Vera Bag", price: "463" },
            { id: 5, name: "Olive Crochet Hobo Bag", price: "453" },
            { id: 6, name: "Crochet Pattern City Bag", price: "463" },
            { id: 7, name: "Crochet Bag Pattern Lydia Bag", price: "453" },
            { id: 8, name: "Love Letters From Another World", price: "583" },
            { id: 9, name: "Crochet Pattern Luana Bag", price: "463" },
            { id: 10, name: "Crochet Pattern Multi-color Striped Bag", price: "447" },
            { id: 11, name: "Crochet Pattern Mini Fringe Bag", price: "463" },
            { id: 12, name: "Love Letters From Another World", price: "459" },
            { id: 13, name: "Crochet Pattern Lecce Bag", price: "463" },
            { id: 14, name: "Crochet Pattern Ferrara Bag", price: "463" },
            { id: 15, name: "Crochet Pattern Minime Bag", price: "463" },
            { id: 16, name: "Crochet Pattern Ronda Bag", price: "463" },
            { id: 17, name: "Crochet Pattern Vera Bag", price: "463" },
            { id: 18, name: "Crochet Pattern Ferrara Bag", price: "463" },
            { id: 19, name: "Crochet Pattern Ferrara Bag", price: "463" }
        ];

        let favorites = [];

        function renderBags() {
            const grid = document.getElementById('bagGrid');
            grid.innerHTML = bagData.map(bag => `
                <div class="product-card relative">
                    <img src="bag${bag.id}.png" alt="${bag.name}" onerror="this.src='https://via.placeholder.com/300x360/2d2833/ffffff?text=Image'">
                    <button class="absolute top-3 right-3 bg-white/90 p-2 rounded-full shadow-md" onclick="toggleFav(${bag.id}, this)">
                        <svg class="w-4 h-4 transition-colors ${favorites.includes(bag.id) ? 'fill-red-500 stroke-red-500' : 'text-black'}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path>
                        </svg>
                    </button>
                    <div class="mt-3">
                        <p class="text-[11px] font-bold uppercase text-gray-400 line-clamp-1">${bag.name}</p>
                        <div class="flex items-center gap-2 mt-0.5">
                            <p class="text-[16px] font-bold text-white">₹99</p>
                            <p class="text-[12px] font-medium text-gray-500 line-through">₹${bag.price}</p>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function toggleFav(id, btn) {
            const index = favorites.indexOf(id);
            if (index > -1) {
                favorites.splice(index, 1);
            } else {
                favorites.push(id);
            }
            renderBags(); // Update home icons
            updateFavPage(); // Update favs list
        }

        function updateFavPage() {
            const favList = document.getElementById('favList');
            const emptyMsg = document.getElementById('emptyFav');
            
            if (favorites.length === 0) {
                favList.innerHTML = '';
                emptyMsg.style.display = 'block';
                return;
            }

            emptyMsg.style.display = 'none';
            const favItems = bagData.filter(bag => favorites.includes(bag.id));
            favList.innerHTML = favItems.map(bag => `
                <div class="product-card relative">
                    <img src="bag${bag.id}.png" alt="${bag.name}">
                    <div class="mt-3">
                        <p class="text-[11px] font-bold uppercase text-gray-400 line-clamp-1">${bag.name}</p>
                        <p class="text-[14px] font-bold text-white">₹99</p>
                    </div>
                </div>
            `).join('');
        }

        function showPage(pageId, navElement) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(navElement) navElement.classList.add('active');
            window.scrollTo(0, 0);
        }

        renderBags();
    </script>
</body>
</html>
