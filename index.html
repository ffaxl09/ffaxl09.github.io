 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LuxBag | Premium Handmade Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #f472b6;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
        }

        body {
            background-color: var(--bg-dark);
            color: #f8fafc;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .product-card {
            background: var(--card-bg);
            border-radius: 24px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .product-card:hover {
            transform: translateY(-5px);
            border-color: rgba(244, 114, 182, 0.3);
        }

        .product-card img {
            border-radius: 20px;
            aspect-ratio: 1/1;
            object-fit: cover;
        }

        .page-content { display: none; animation: fadeIn 0.4s ease-out; }
        .page-content.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-primary {
            background: linear-gradient(135deg, #f472b6 0%, #db2777 100%);
            transition: transform 0.2s;
        }

        .btn-primary:active { transform: scale(0.95); }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="pb-24">

    <div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 z-[100] px-6 py-3 rounded-full bg-white text-black font-bold shadow-2xl opacity-0 pointer-events-none transition-all duration-300">
        Item added to bag ✨
    </div>

    <header class="sticky top-0 z-40 px-4 py-4 glass">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xs uppercase tracking-[0.2em] text-pink-400 font-bold">Boutique</h1>
                <p class="text-xl font-extrabold tracking-tight">LUX<span class="text-pink-500">BAG</span></p>
            </div>
            <button onclick="showPage('cartPage')" class="relative p-2 bg-white/5 rounded-full">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/>
                </svg>
                <span id="cartCount" class="absolute -top-1 -right-1 bg-pink-500 text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full hidden">0</span>
            </button>
        </div>
    </header>

    <main id="homePage" class="page-content active px-4 max-w-md mx-auto">
        <div class="my-8 p-6 rounded-[2rem] bg-gradient-to-br from-pink-500/20 to-transparent border border-pink-500/10">
            <h2 class="text-2xl font-bold leading-tight">Artisan Handcrafted <br>Collection</h2>
            <p class="text-pink-400 text-sm mt-2 font-medium">Limited Flash Sale: All at ₹99</p>
        </div>

        <div class="grid grid-cols-2 gap-4" id="bagGrid">
            </div>
    </main>

    <div id="cartPage" class="page-content px-6 max-w-md mx-auto">
        <div class="flex items-center gap-4 my-8">
            <button onclick="showPage('homePage')" class="p-2 bg-white/5 rounded-full">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            </button>
            <h2 class="text-2xl font-bold">Your Bag</h2>
        </div>
        
        <div id="cartList" class="space-y-4"></div>

        <div id="emptyCart" class="text-center py-20 hidden">
            <div class="text-6xl mb-4">empty...</div>
            <p class="text-gray-400">Your bag is empty. Let's fill it with style!</p>
        </div>

        <div id="cartSummary" class="mt-8 p-6 rounded-3xl bg-white/5 border border-white/10 hidden">
            <div class="flex justify-between items-center mb-6">
                <span class="text-gray-400">Total Amount</span>
                <span id="cartTotal" class="text-2xl font-bold text-pink-500">₹0</span>
            </div>
            <button onclick="showPage('checkoutPage')" class="w-full btn-primary py-4 rounded-2xl font-bold text-lg shadow-lg shadow-pink-500/20">
                Checkout Now
            </button>
        </div>
    </div>

    <div id="checkoutPage" class="page-content px-6 max-w-md mx-auto">
        <h2 class="text-2xl font-bold my-8">Delivery Details</h2>
        <form onsubmit="handlePayment(event)" class="space-y-4">
            <input type="text" placeholder="Full Name" required class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl focus:border-pink-500 outline-none transition-all">
            <input type="tel" placeholder="Phone Number" required class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl focus:border-pink-500 outline-none transition-all">
            <textarea placeholder="Complete Address" rows="4" required class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl focus:border-pink-500 outline-none transition-all"></textarea>
            <button type="submit" class="w-full btn-primary py-4 rounded-2xl font-bold text-lg">Pay with UPI</button>
        </form>
    </div>

    <div id="qrModal" class="modal fixed inset-0 z-[100] hidden items-center justify-center p-6 bg-black/90 backdrop-blur-sm">
        <div class="bg-slate-900 border border-white/10 p-8 rounded-[2.5rem] w-full max-w-sm text-center">
            <h3 class="text-xl font-bold">Scan to Pay</h3>
            <p id="finalAmount" class="text-pink-500 text-3xl font-black my-4">₹99</p>
            <div class="bg-white p-4 rounded-3xl inline-block mb-6">
                <img src="1000001796.png" class="w-48 h-48" alt="QR Code">
            </div>
            
            <label class="block cursor-pointer group">
                <div class="border-2 border-dashed border-slate-700 group-hover:border-pink-500 rounded-2xl py-4 transition-all">
                    <span id="uploadText" class="text-sm font-semibold text-slate-400">Upload Screenshot</span>
                </div>
                <input type="file" class="hidden" onchange="handleUpload(this)">
            </label>

            <button id="doneBtn" onclick="showSuccess()" class="w-full mt-6 py-4 bg-green-500 rounded-2xl font-bold opacity-30 pointer-events-none transition-all">I have paid</button>
        </div>
    </div>

    <div id="successPage" class="fixed inset-0 z-[200] bg-slate-900 hidden flex-col items-center justify-center text-center p-6">
        <div class="w-24 h-24 bg-green-500/20 text-green-500 rounded-full flex items-center justify-center mb-6 scale-up">
            <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M5 13l4 4L19 7"/></svg>
        </div>
        <h2 class="text-3xl font-bold">Order Received!</h2>
        <p class="text-slate-400 mt-2">Check your WhatsApp for tracking details.</p>
        <button onclick="location.reload()" class="mt-10 text-pink-500 font-bold uppercase tracking-widest">Back to Home</button>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 glass border-t border-white/5 py-4 px-10 flex justify-around items-center z-40">
        <button onclick="showPage('homePage')" class="nav-link text-pink-500">
            <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/></svg>
        </button>
        <button onclick="showPage('cartPage')" class="nav-link text-slate-500">
            <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
        </button>
    </nav>

    <script>
        const bagData = Array.from({length: 19}, (_, i) => ({
            id: i + 1,
            name: `Aura Canvas Bag 0${i + 1}`,
            price: 99,
            image: `bag${i + 1}.png`
        }));

        let cart = [];

        function renderBags() {
            const grid = document.getElementById('bagGrid');
            grid.innerHTML = bagData.map(bag => `
                <div class="product-card p-3">
                    <img src="${bag.image}" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1544816155-12df9643f363?auto=format&fit=crop&q=80&w=300'">
                    <div class="mt-3 px-1">
                        <h3 class="text-sm font-semibold text-slate-200 truncate">${bag.name}</h3>
                        <div class="flex justify-between items-center mt-2">
                            <span class="text-pink-500 font-bold">₹${bag.price}</span>
                            <button onclick="addToCart(${bag.id})" class="p-2 bg-pink-500/10 text-pink-500 rounded-xl hover:bg-pink-500 hover:text-white transition-colors">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function showPage(pageId) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            window.scrollTo(0,0);
        }

        function addToCart(id) {
            const product = bagData.find(b => b.id === id);
            cart.push(product);
            updateCartUI();
            
            const toast = document.getElementById('toast');
            toast.style.opacity = '1';
            toast.style.transform = 'translate(-50%, 20px)';
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translate(-50%, 0)';
            }, 2000);
        }

        function updateCartUI() {
            const cartCount = document.getElementById('cartCount');
            const cartList = document.getElementById('cartList');
            const cartSummary = document.getElementById('cartSummary');
            const emptyCart = document.getElementById('emptyCart');
            
            cartCount.innerText = cart.length;
            cartCount.classList.toggle('hidden', cart.length === 0);
            
            if (cart.length === 0) {
                emptyCart.classList.remove('hidden');
                cartSummary.classList.add('hidden');
                cartList.innerHTML = '';
            } else {
                emptyCart.classList.add('hidden');
                cartSummary.classList.remove('hidden');
                
                cartList.innerHTML = cart.map((item, index) => `
                    <div class="flex items-center gap-4 bg-white/5 p-4 rounded-2xl border border-white/5">
                        <img src="${item.image}" class="w-20 h-20 rounded-xl object-cover">
                        <div class="flex-grow">
                            <h4 class="font-bold text-sm">${item.name}</h4>
                            <p class="text-pink-500 font-bold">₹${item.price}</p>
                        </div>
                        <button onclick="removeFromCart(${index})" class="p-2 text-slate-500">✕</button>
                    </div>
                `).join('');
            }
            
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('cartTotal').innerText = `₹${total}`;
            document.getElementById('finalAmount').innerText = `₹${total}`;
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        function handlePayment(e) {
            e.preventDefault();
            document.getElementById('qrModal').classList.remove('hidden');
            document.getElementById('qrModal').classList.add('flex');
        }

        function handleUpload(input) {
            if (input.files && input.files[0]) {
                document.getElementById('uploadText').innerText = "✅ Screenshot Added";
                document.getElementById('doneBtn').classList.remove('opacity-30', 'pointer-events-none');
            }
        }

        function showSuccess() {
            document.getElementById('qrModal').classList.add('hidden');
            document.getElementById('successPage').classList.remove('hidden');
            document.getElementById('successPage').classList.add('flex');
        }

        // Initialize
        renderBags();
    </script>
</body>
</html>
