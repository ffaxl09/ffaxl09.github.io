 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Handmade Bag Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #1a161f; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; margin: 0; }
        .product-card { transition: transform 0.2s; background: #2d2833; border-radius: 20px; overflow: hidden; }
        .product-card:active { transform: scale(0.96); }
        .product-card img { width: 100%; aspect-ratio: 1/1.2; object-fit: cover; }
        .page-content { display: none; }
        .page-content.active { display: block; }
        input, textarea { background: #1a161f !important; border: 1px solid #3f3947 !important; color: white !important; padding: 14px; border-radius: 12px; width: 100%; outline: none; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        #toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(100px); background: #ec4899; color: white; padding: 12px 24px; border-radius: 50px; font-weight: bold; z-index: 300; opacity: 0; transition: all 0.4s; }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        #successOverlay { display: none; position: fixed; inset: 0; background: #1a161f; z-index: 200; align-items: center; justify-content: center; text-align: center; flex-direction: column; }
    </style>
</head>
<body class="pb-24">

    <div id="toast">Added to Cart! 🛍️</div>

    <div id="successOverlay">
        <h2 class="text-3xl font-bold text-green-500">Order Received!</h2>
        <p class="mt-4 text-gray-400">Opening WhatsApp for confirmation...</p>
    </div>

    <div id="paymentModal" class="modal">
        <div class="bg-[#2d2833] p-8 rounded-[32px] w-full max-w-sm text-center border border-white/10">
            <h3 class="text-xl font-bold mb-6">Complete Your Order</h3>
            <div class="space-y-4">
                <button onclick="payViaUPI()" class="w-full bg-white text-black py-4 rounded-2xl font-bold">PAY VIA UPI APP</button>
                <button onclick="payViaWhatsApp()" class="w-full bg-[#25D366] text-white py-4 rounded-2xl font-bold">ORDER ON WHATSAPP</button>
            </div>
            <button onclick="closePaymentModal()" class="mt-6 text-gray-500 underline">Cancel</button>
        </div>
    </div>

    <div class="p-4 sticky top-0 bg-[#1a161f]/90 backdrop-blur-md z-50">
        <div class="flex justify-between items-center bg-[#2d2833] rounded-full px-5 py-3">
            <span class="font-bold text-pink-500 text-lg">BAG STORE</span>
            <div onclick="showPage('cartPage')" class="relative">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                <span id="cartCount" class="absolute -top-2 -right-2 bg-pink-600 text-[10px] w-5 h-5 flex items-center justify-center rounded-full hidden">0</span>
            </div>
        </div>
    </div>

    <div id="homePage" class="page-content active px-4">
        <h2 class="my-6 text-xl font-bold">Flash Sale (₹99)</h2>
        <div class="grid grid-cols-2 gap-4" id="bagGrid"></div>
    </div>

    <div id="cartPage" class="page-content p-6">
        <h2 class="text-2xl font-bold mb-6">Your Cart</h2>
        <div id="cartList" class="space-y-4"></div>
        <div id="cartSummary" class="mt-8 hidden">
            <button onclick="showPage('checkoutPage')" class="w-full bg-pink-600 py-4 rounded-2xl font-bold">GO TO CHECKOUT</button>
        </div>
    </div>

    <div id="checkoutPage" class="page-content p-6">
        <h2 class="text-2xl font-bold mb-6">Delivery Details</h2>
        <form onsubmit="handleCheckout(event)" class="space-y-4">
            <input type="text" placeholder="Your Name" required>
            <input type="tel" placeholder="Mobile Number" required>
            <input type="number" placeholder="Pincode" required>
            <textarea placeholder="Full Address" required></textarea>
            <button type="submit" class="w-full bg-pink-600 py-4 rounded-2xl font-bold">CONFIRM & PAY</button>
        </form>
    </div>

    <script>
        const MY_UPI_ID = "9118886511@ptsbi"; 
        const MY_WHATS_NUMBER = "9118886511";

        let cart = [];
        let userData = {};

        function renderBags() {
            const grid = document.getElementById('bagGrid');
            let html = '';
            for(let i=1; i<=19; i++) {
                html += `<div class="product-card" onclick="addToCart(${i})">
                    <img src="bag${i}.png" onerror="this.src='https://via.placeholder.com/150'">
                    <div class="p-4"><p class="text-xs text-gray-400">Handmade Bag ${i}</p><p class="font-bold">₹99</p></div>
                </div>`;
            }
            grid.innerHTML = html;
        }

        function addToCart(id) {
            cart.push({id, name: 'Handmade Bag ' + id});
            updateCart();
            const t = document.getElementById('toast');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        function updateCart() {
            document.getElementById('cartCount').innerText = cart.length;
            document.getElementById('cartCount').classList.toggle('hidden', cart.length === 0);
            document.getElementById('cartSummary').classList.toggle('hidden', cart.length === 0);
            document.getElementById('cartList').innerHTML = cart.map((item, idx) => `
                <div class="flex justify-between bg-[#2d2833] p-4 rounded-xl">
                    <span>${item.name}</span>
                    <button onclick="cart.splice(${idx},1);updateCart()">✕</button>
                </div>
            `).join('');
        }

        function handleCheckout(e) {
            e.preventDefault();
            userData = { name: e.target.elements[0].value, phone: e.target.elements[1].value, pin: e.target.elements[2].value, addr: e.target.elements[3].value };
            document.getElementById('paymentModal').classList.add('active');
        }

        function payViaUPI() {
            window.location.href = `upi://pay?pa=${MY_UPI_ID}&pn=BagStore&am=${cart.length*99}&cu=INR`;
            finalSuccess();
        }

        function payViaWhatsApp() {
            const msg = `Order: ${cart.length} Bags%0AName: ${userData.name}%0AAddr: ${userData.addr}, ${userData.pin}`;
            window.open(`https://wa.me/${MY_WHATS_NUMBER}?text=${msg}`, '_blank');
            finalSuccess();
        }

        function finalSuccess() {
            document.getElementById('paymentModal').classList.remove('active');
            document.getElementById('successOverlay').style.display = 'flex';
            setTimeout(() => location.reload(), 5000);
        }

        function showPage(id) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        renderBags();
    </script>
</body>
</html>
