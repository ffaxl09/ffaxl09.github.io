 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anitya - Flat 99 Sale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Poppins:wght@700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #1a161f; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .brand-font { font-family: 'Poppins', sans-serif; }
        .product-card { transition: transform 0.2s; background: #2d2833; border-radius: 24px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); position: relative; }
        .product-card:active { transform: scale(0.96); }
        .product-card img { width: 100%; aspect-ratio: 1/1.2; object-fit: cover; cursor: zoom-in; }
        
        .page-content { display: none; }
        .page-content.active { display: block; }
        input, textarea { background: #1a161f !important; border: 1px solid #3f3947 !important; color: white !important; padding: 14px; border-radius: 12px; width: 100%; outline: none; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; align-items: center; justify-content: center; padding: 20px; backdrop-blur: 8px; }
        .modal.active { display: flex; }

        #toast {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: #ec4899; color: white; padding: 12px 28px; border-radius: 50px;
            font-weight: bold; font-size: 14px; z-index: 300; opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(236, 72, 153, 0.4);
        }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        #successOverlay { display: none; position: fixed; inset: 0; background: #1a161f; z-index: 200; align-items: center; justify-content: center; text-align: center; flex-direction: column; }
        .checkmark-circle { width: 100px; height: 100px; border: 6px solid #22c55e; border-radius: 50%; display: flex; align-items: center; justify-content: center; animation: bounceIn 0.6s forwards; }
        @keyframes bounceIn { from { transform: scale(0); } to { transform: scale(1); } }
        .fade-in-up { animation: fadeInUp 0.6s ease-out forwards; opacity: 0; }
        @keyframes fadeInUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="pb-24">

    <div id="toast">Added to Cart! 🛍️</div>

    <div id="zoomModal" class="modal" onclick="closeZoom()">
        <div class="relative max-w-sm w-full text-center" onclick="event.stopPropagation()">
            <button onclick="closeZoom()" class="absolute -top-14 right-0 text-white text-4xl">&times;</button>
            <img id="zoomedImg" src="" class="mx-auto rounded-3xl shadow-2xl max-h-[60vh] object-contain bg-[#2d2833]">
            <h3 id="zoomedName" class="mt-6 text-xl font-bold px-4 brand-font"></h3>
            <div class="flex items-center justify-center gap-2 mt-2">
                <span class="text-pink-500 font-bold text-3xl">₹99</span>
                <span id="zoomedOldPrice" class="text-gray-500 line-through text-lg"></span>
            </div>
            <button id="zoomAddBtn" class="mt-6 w-[90%] mx-auto bg-pink-600 py-4 rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-transform uppercase tracking-widest">ADD TO CART</button>
        </div>
    </div>

    <div id="successOverlay">
        <div class="checkmark-circle"><svg class="w-16 h-16 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7"></path></svg></div>
        <h2 class="text-3xl font-bold mt-8 fade-in-up">Order Confirmed!</h2>
        <div id="stepMessage" class="mt-6 bg-pink-600/10 border border-pink-500/20 p-6 rounded-2xl hidden mx-6">
            <p class="text-pink-400 font-bold text-lg">Your order delivery soon, please wait.</p>
        </div>
    </div>

    <div class="p-4 sticky top-0 bg-[#1a161f]/90 backdrop-blur-md z-50">
        <div class="flex justify-between items-center bg-[#2d2833] rounded-full px-6 py-3 border border-white/5 shadow-xl">
            <span class="font-bold text-pink-500 text-xl brand-font tracking-widest uppercase">Anitya अनित्य</span>
            <div class="relative" onclick="showPage('cartPage', document.getElementById('cartBtn'))">
                <svg class="w-7 h-7 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                <span id="cartCount" class="absolute -top-2 -right-2 bg-pink-600 text-white text-[11px] w-5 h-5 flex items-center justify-center rounded-full border-2 border-[#2d2833] hidden font-bold">0</span>
            </div>
        </div>
    </div>

    <div id="homePage" class="page-content active px-4">
        <div class="flex justify-between items-center my-6 px-2">
            <h2 class="text-xl font-bold italic tracking-tight brand-font">Flash Sale ₹99</h2>
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-ping"></span>
                <span class="text-pink-500 text-[10px] font-black uppercase tracking-widest">LIVE SALE</span>
            </div>
        </div>
        <div class="grid grid-cols-2 gap-4 mb-8" id="bagGrid"></div>
    </div>

    <div id="cartPage" class="page-content p-6">
        <h2 class="text-2xl font-bold mb-8 brand-font">Cart Summary</h2>
        <div id="cartList" class="space-y-4 mb-8"></div>
        <div id="cartSummary" class="hidden bg-[#2d2833] p-6 rounded-[32px] border border-white/5">
            <div class="flex justify-between text-xl font-bold mb-8"><span>Total</span><span id="cartTotal" class="text-pink-500">₹0</span></div>
            <button onclick="openCheckout()" class="w-full bg-pink-600 py-4 rounded-2xl font-bold text-lg shadow-lg">CHECKOUT</button>
        </div>
        <div id="emptyCart" class="text-center py-20 opacity-40 font-medium">No items in cart</div>
    </div>

    <div id="checkoutPage" class="page-content p-6">
        <div class="flex items-center mb-10">
            <button onclick="showPage('cartPage')" class="mr-4 bg-white/5 p-3 rounded-2xl text-pink-500">←</button>
            <h2 class="text-2xl font-bold">Delivery Info</h2>
        </div>
        <form class="space-y-5" onsubmit="handlePayment(event)">
            <input type="text" placeholder="Your Name" required>
            <input type="tel" placeholder="Mobile Number" required pattern="[0-9]{10}">
            <input type="number" placeholder="Pincode" required>
            <textarea rows="4" placeholder="Full Address..." required></textarea>
            <button type="submit" class="w-full bg-pink-600 py-4 rounded-2xl font-bold mt-10 text-lg shadow-xl shadow-pink-600/30">PAY NOW</button>
        </form>
    </div>

    <div id="qrModal" class="modal">
        <div class="bg-[#2d2833] p-6 rounded-[32px] w-full max-w-sm text-center border border-white/10 max-h-[85vh] overflow-y-auto shadow-2xl my-auto">
            <h3 class="text-xl font-bold mb-1">Scan & Pay</h3>
            <p class="text-pink-500 font-bold mb-6 text-lg">Final Amount: <span id="finalAmount">₹0</span></p>
            
            <img src="1000001796.png" class="w-48 mx-auto rounded-3xl mb-6 border-4 border-white/10 bg-white p-1 shadow-inner">
            
            <div class="pt-6 border-t border-white/5">
                <p class="text-[10px] text-gray-500 mb-4 font-black uppercase tracking-widest uppercase">Upload Verification</p>
                <label class="block w-full bg-white/5 border-2 border-dashed border-gray-600 rounded-2xl py-6 cursor-pointer active:bg-white/10">
                    <span id="uploadText" class="text-xs text-pink-400 font-bold uppercase">Click to Upload Screenshot</span>
                    <input type="file" id="screenshotInput" accept="image/*" class="hidden" onchange="previewImage(this)">
                </label>
                <img id="screenshotPreview" src="" class="mt-4 mx-auto max-w-[120px] rounded-xl border-2 border-pink-500 shadow-2xl" style="display:none;">
            </div>

            <button onclick="finalSuccess()" id="doneBtn" class="w-full bg-green-600 py-4 rounded-2xl font-bold mt-8 opacity-40 pointer-events-none shadow-lg uppercase tracking-tighter">DONE / PAID</button>
            <button onclick="closeModal()" class="text-gray-500 text-[10px] mt-6 block mx-auto font-bold uppercase underline">Cancel Payment</button>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-black/95 backdrop-blur-xl border-t border-white/5 flex justify-around py-5 z-50">
        <div id="homeBtn" onclick="showPage('homePage', this)" class="nav-item active flex flex-col items-center text-gray-500 transition-colors"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg></div>
        <div id="cartBtn" onclick="showPage('cartPage', this)" class="nav-item flex flex-col items-center text-gray-500 transition-colors"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg></div>
    </div>

    <script>
        // Har item ki price flat 99 set ki gayi hai, list wali price oldPrice hai.
        const bagData = [
            { id: 1, name: "Crochet Tote Bag", oldPrice: 396 },
            { id: 2, name: "Crochet Furry Bag", oldPrice: 463 },
            { id: 3, name: "Crochet Nuvol Bag", oldPrice: 463 },
            { id: 4, name: "Crochet Vera Bag", oldPrice: 463 },
            { id: 5, name: "Olive Crochet Hobo", oldPrice: 453 },
            { id: 6, name: "Crochet City Bag", oldPrice: 463 },
            { id: 7, name: "Crochet Lydia Bag", oldPrice: 453 },
            { id: 8, name: "Letters From World", oldPrice: 583 },
            { id: 9, name: "Crochet Luana Bag", oldPrice: 463 },
            { id: 10, name: "Multi-color Striped", oldPrice: 447 },
            { id: 11, name: "Mini Fringe Bag", oldPrice: 463 },
            { id: 12, name: "Love Letters Pink", oldPrice: 459 },
            { id: 13, name: "Crochet Lecce Bag", oldPrice: 463 },
            { id: 14, name: "Crochet Ferrara Bag", oldPrice: 463 },
            { id: 15, name: "Crochet Minime Bag", oldPrice: 463 },
            { id: 16, name: "Crochet Ronda Bag", oldPrice: 463 },
            { id: 17, name: "Vera Pattern Ed.", oldPrice: 463 },
            { id: 18, name: "Ferrara Pattern Ed.", oldPrice: 463 },
            { id: 19, name: "Ferrara Classic Ed.", oldPrice: 463 }
        ];

        let cart = [];

        function renderBags() {
            const grid = document.getElementById('bagGrid');
            grid.innerHTML = bagData.map(bag => `
                <div class="product-card" onclick="addToCart(${bag.id})">
                    <img src="bag${bag.id}.png" onclick="event.stopPropagation(); openZoom('bag${bag.id}.png', '${bag.name}', ${bag.oldPrice})" onerror="this.src='https://via.placeholder.com/300x360/2d2833/ffffff?text=Anitya'">
                    <span class="absolute top-3 left-3 bg-pink-600 text-[9px] font-black px-2 py-1 rounded-lg uppercase shadow-xl tracking-tighter">Flat ₹99</span>
                    <div class="p-4">
                        <p class="text-[10px] text-gray-400 font-black uppercase line-clamp-1 mb-1 tracking-wider">${bag.name}</p>
                        <div class="flex justify-between items-end">
                            <div>
                                <p class="text-pink-500 font-black text-xl leading-none">₹99</p>
                                <p class="text-[10px] text-gray-500 line-through mt-1">₹${bag.oldPrice}</p>
                            </div>
                            <div class="bg-pink-600 text-white text-[9px] px-4 py-2 rounded-full font-black shadow-lg">ADD</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id) {
            cart.push(bagData.find(b => b.id === id));
            updateCart();
            const t = document.getElementById('toast');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        function openZoom(src, name, oldPrice) {
            document.getElementById('zoomedImg').src = src;
            document.getElementById('zoomedName').innerText = name;
            document.getElementById('zoomedOldPrice').innerText = '₹' + oldPrice;
            document.getElementById('zoomAddBtn').onclick = () => { addToCart(bagData.find(b => b.name === name).id); closeZoom(); };
            document.getElementById('zoomModal').classList.add('active');
        }

        function closeZoom() { document.getElementById('zoomModal').classList.remove('active'); }

        function updateCart() {
            const count = document.getElementById('cartCount');
            count.innerText = cart.length;
            count.classList.toggle('hidden', cart.length === 0);
            document.getElementById('emptyCart').style.display = cart.length === 0 ? 'block' : 'none';
            document.getElementById('cartSummary').classList.toggle('hidden', cart.length === 0);
            document.getElementById('cartList').innerHTML = cart.map((item, index) => `
                <div class="flex items-center gap-4 bg-[#2d2833] p-4 rounded-3xl border border-white/5">
                    <img src="bag${item.id}.png" class="w-16 h-16 rounded-2xl object-cover">
                    <div class="flex-grow"><p class="font-bold text-sm line-clamp-1">${item.name}</p><p class="text-pink-500 font-black mt-1">₹99</p></div>
                    <button onclick="event.stopPropagation(); removeFromCart(${index})" class="text-gray-500 p-2">✕</button>
                </div>
            `).join('');
            const total = cart.length * 99;
            document.getElementById('cartTotal').innerText = '₹' + total;
            document.getElementById('finalAmount').innerText = '₹' + total;
        }

        function removeFromCart(i) { cart.splice(i, 1); updateCart(); }
        function openCheckout() { showPage('checkoutPage'); }
        function handlePayment(e) { e.preventDefault(); document.getElementById('qrModal').classList.add('active'); }
        function closeModal() { document.getElementById('qrModal').classList.remove('active'); }

        function previewImage(input) {
            const preview = document.getElementById('screenshotPreview');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    document.getElementById('doneBtn').classList.remove('opacity-40', 'pointer-events-none');
                    document.getElementById('uploadText').innerText = "PHOTO SELECTED";
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function finalSuccess
