 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Handmade Bag Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #1a161f; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .product-card img { border-radius: 16px; width: 100%; aspect-ratio: 1/1.2; object-fit: cover; background-color: #2d2833; }
        .nav-item.active { color: white !important; }
        .page-content { display: none; }
        .page-content.active { display: block; }
        input, textarea { background: #2d2833 !important; border: 1px solid #3f3947 !important; color: white !important; padding: 12px; border-radius: 8px; width: 100%; outline: none; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        
        /* Two-Step Success Overlay */
        #successOverlay { display: none; position: fixed; inset: 0; background: #1a161f; z-index: 200; align-items: center; justify-content: center; text-align: center; padding: 20px; flex-direction: column; }
        
        .checkmark-circle {
            width: 90px; height: 90px; border: 5px solid #22c55e; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            animation: bounceIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
        }
        @keyframes bounceIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .fade-in-up { animation: fadeInUp 0.5s ease-out forwards; opacity: 0; }
        @keyframes fadeInUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        #screenshotPreview { display: none; width: 90px; height: 90px; object-fit: cover; border-radius: 12px; margin: 12px auto; border: 2px solid #ec4899; }
    </style>
</head>
<body class="pb-24">

    <div id="successOverlay">
        <div class="checkmark-circle">
            <svg class="w-14 h-14 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7"></path>
            </svg>
        </div>
        
        <h2 id="stepTitle" class="text-3xl font-bold mt-8 text-white fade-in-up">Order Confirmed!</h2>
        
        <div id="stepMessage" class="mt-6 bg-pink-600/10 border border-pink-500/20 p-5 rounded-2xl hidden mx-4">
            <p class="text-pink-400 font-bold text-lg">Your order delivery soon, please wait.</p>
        </div>
        
        <p class="text-gray-500 text-sm mt-8 animate-pulse">Processing your details...</p>
    </div>

    <div class="p-4 sticky top-0 bg-[#1a161f]/95 backdrop-blur-md z-50">
        <div class="flex justify-between items-center bg-[#2d2833] rounded-full px-5 py-3">
            <span class="font-bold text-pink-500 tracking-wider">BAG STORE</span>
            <div class="relative" onclick="showPage('cartPage', document.getElementById('cartBtn'))">
                <svg class="w-6 h-6 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                <span id="cartCount" class="absolute -top-2 -right-2 bg-pink-600 text-white text-[10px] w-4 h-4 flex items-center justify-center rounded-full hidden">0</span>
            </div>
        </div>
    </div>

    <div id="homePage" class="page-content active px-4">
        <h2 class="text-lg font-bold my-5 px-1">Flash Sale - All ₹99</h2>
        <div class="grid grid-cols-2 gap-4" id="bagGrid"></div>
    </div>

    <div id="cartPage" class="page-content p-5">
        <h2 class="text-2xl font-bold mb-6 text-center">Your Cart</h2>
        <div id="cartList" class="space-y-4 mb-8"></div>
        <div id="cartSummary" class="hidden border-t border-gray-800 pt-6">
            <div class="flex justify-between text-xl font-bold mb-8"><span>Total:</span><span id="cartTotal">₹0</span></div>
            <button onclick="openCheckout()" class="w-full bg-pink-600 py-4 rounded-2xl font-bold text-lg shadow-lg shadow-pink-600/20">PROCEED TO CHECKOUT</button>
        </div>
        <div id="emptyCart" class="text-center text-gray-500 mt-20">Your cart is empty!</div>
    </div>

    <div id="checkoutPage" class="page-content p-6">
        <div class="flex items-center mb-8">
            <button onclick="showPage('cartPage')" class="mr-4 text-pink-500 text-xl">←</button>
            <h2 class="text-2xl font-bold">Shipping Address</h2>
        </div>
        <form class="space-y-5" onsubmit="handlePayment(event)">
            <input type="text" placeholder="Your Full Name" required>
            <input type="tel" placeholder="10-Digit Mobile Number" required pattern="[0-9]{10}">
            <input type="number" placeholder="Pincode" required>
            <textarea rows="3" placeholder="House No, Area, Landmark..." required></textarea>
            <button type="submit" class="w-full bg-pink-600 py-4 rounded-2xl font-bold mt-8 text-lg">PROCEED TO PAY</button>
        </form>
    </div>

    <div id="qrModal" class="modal">
        <div class="bg-[#2d2833] p-8 rounded-[32px] w-full max-w-sm text-center border border-white/5">
            <h3 class="text-xl font-bold mb-2">Scan & Pay</h3>
            <p class="text-pink-500 font-bold mb-6 text-lg tracking-tight">Amount: <span id="finalAmount">₹0</span></p>
            
            <img src="1000001796.png" class="w-44 mx-auto rounded-2xl mb-6 border-4 border-white/10 shadow-2xl">
            
            <div class="pt-2 border-t border-white/5">
                <p class="text-xs text-gray-400 mb-4 uppercase font-semibold tracking-widest">Verification Required</p>
                <label class="block w-full bg-white/5 border-2 border-dashed border-gray-600 rounded-2xl py-4 cursor-pointer hover:bg-white/10">
                    <span id="uploadText" class="text-xs text-pink-400 font-bold">+ UPLOAD SCREENSHOT</span>
                    <input type="file" id="screenshotInput" accept="image/*" class="hidden" onchange="previewImage(this)">
                </label>
                <img id="screenshotPreview" src="">
            </div>

            <button onclick="finalSuccess()" id="doneBtn" class="w-full bg-green-600 py-4 rounded-2xl font-bold mt-8 opacity-50 pointer-events-none transition-all duration-300">I HAVE PAID</button>
            <button onclick="closeModal()" class="text-gray-500 text-xs mt-5 block mx-auto underline">Go Back</button>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-black/95 border-t border-gray-800 flex justify-around py-4 z-50">
        <div id="homeBtn" onclick="showPage('homePage', this)" class="nav-item active flex flex-col items-center"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg></div>
        <div id="cartBtn" onclick="showPage('cartPage', this)" class="nav-item flex flex-col items-center"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg></div>
    </div>

    <script>
        const bagData = [
            { id: 1, name: "Crochet Pattern Crochet Tote Bag" },
            { id: 2, name: "Crochet Pattern Furry Bag" },
            { id: 3, name: "Crochet Pattern Nuvol Bag" },
            { id: 4, name: "Crochet Pattern Vera Bag" },
            { id: 5, name: "Olive Crochet Hobo Bag" },
            { id: 6, name: "Crochet Pattern City Bag" },
            { id: 7, name: "Crochet Bag Pattern Lydia Bag" },
            { id: 8, name: "Love Letters From Another World" },
            { id: 9, name: "Crochet Pattern Luana Bag" },
            { id: 10, name: "Crochet Pattern Multi-color Striped Bag" },
            { id: 11, name: "Crochet Pattern Mini Fringe Bag" },
            { id: 12, name: "Love Letters From Another World" },
            { id: 13, name: "Crochet Pattern Lecce Bag" },
            { id: 14, name: "Crochet Pattern Ferrara Bag" },
            { id: 15, name: "Crochet Pattern Minime Bag" },
            { id: 16, name: "Crochet Pattern Ronda Bag" },
            { id: 17, name: "Crochet Pattern Vera Bag" },
            { id: 18, name: "Crochet Pattern Ferrara Bag" },
            { id: 19, name: "Crochet Pattern Ferrara Bag" }
        ];

        let cart = [];

        function renderBags() {
            const grid = document.getElementById('bagGrid');
            grid.innerHTML = bagData.map(bag => `
                <div class="product-card">
                    <img src="bag${bag.id}.png" alt="${bag.name}" onerror="this.src='https://via.placeholder.com/300x360/2d2833/ffffff?text=Bag'">
                    <div class="p-3">
                        <p class="text-[10px] text-gray-400 font-semibold line-clamp-1 uppercase tracking-tight">${bag.name}</p>
                        <div class="flex justify-between items-center mt-2">
                            <span class="font-bold text-white text-lg">₹99</span>
                            <button onclick="addToCart(${bag.id})" class="bg-pink-600 text-white text-[10px] px-4 py-2 rounded-full font-bold">ADD</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id) { cart.push(bagData.find(b => b.id === id)); updateCart(); }

        function updateCart() {
            const count = document.getElementById('cartCount');
            const total = cart.length * 99;
            count.innerText = cart.length;
            count.classList.toggle('hidden', cart.length === 0);
            document.getElementById('emptyCart').style.display = cart.length === 0 ? 'block' : 'none';
            document.getElementById('cartSummary').classList.toggle('hidden', cart.length === 0);
            document.getElementById('cartList').innerHTML = cart.map((item, index) => `
                <div class="flex items-center gap-4 bg-[#2d2833] p-4 rounded-2xl">
                    <img src="bag${item.id}.png" class="w-14 h-14 rounded-xl object-cover">
                    <div class="flex-grow text-sm"><p class="font-bold line-clamp-1">${item.name}</p><p class="text-pink-500 font-bold">₹99</p></div>
                    <button onclick="removeFromCart(${index})" class="text-gray-500 p-2">✕</button>
                </div>
            `).join('');
            document.getElementById('cartTotal').innerText = '₹' + total;
            document.getElementById('finalAmount').innerText = '₹' + total;
        }

        function removeFromCart(index) { cart.splice(index, 1); updateCart(); }
        function openCheckout() { showPage('checkoutPage'); }
        function handlePayment(e) { e.preventDefault(); document.getElementById('qrModal').classList.add('active'); }
        function closeModal() { document.getElementById('qrModal').classList.remove('active'); }

        function previewImage(input) {
            const preview = document.getElementById('screenshotPreview');
            const doneBtn = document.getElementById('doneBtn');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    doneBtn.classList.remove('opacity-50', 'pointer-events-none');
                    document.getElementById('uploadText').innerText = "Change Photo";
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function finalSuccess() {
            closeModal();
            const overlay = document.getElementById('successOverlay');
            const stepTitle = document.getElementById('stepTitle');
            const stepMsg = document.getElementById('stepMessage');
            
            overlay.style.display = 'flex';
            
            // Step 1: Just show "Order Confirmed"
            setTimeout(() => {
                // Step 2: Show Delivery Message after 1.5 seconds
                stepMsg.classList.remove('hidden');
                stepMsg.classList.add('fade-in-up');
            }, 1500);

            setTimeout(() => {
                // Reset and go home after 5 seconds total
                overlay.style.display = 'none';
                stepMsg.classList.add('hidden');
                cart = [];
                updateCart();
                document.getElementById('screenshotPreview').style.display = 'none';
                showPage('homePage', document.getElementById('homeBtn'));
            }, 5500);
        }

        function showPage(pageId, navElement) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            if(navElement) {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                navElement.classList.add('active');
            }
            window.scrollTo(0,0);
        }

        renderBags();
    </script>
</body>
</html>
