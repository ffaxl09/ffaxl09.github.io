 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUXBAG | Haute Couture</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #fb7185; --bg-dark: #020617; }
        body { background-color: var(--bg-dark); color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px) saturate(180%); border-bottom: 1px solid rgba(255, 255, 255, 0.08); }
        
        .product-card {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border-radius: 28px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .page-content { display: none; animation: slideUp 0.5s ease; }
        .page-content.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .btn-premium {
            background: linear-gradient(135deg, #fb7185 0%, #e11d48 100%);
            box-shadow: 0 10px 20px -10px #fb7185;
        }

        /* Full Screen Preview Animation */
        #productModal { transition: all 0.3s ease-in-out; }
        .modal-content { animation: zoomIn 0.3s ease-out; }
        @keyframes zoomIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>

<body class="pb-24">

<div id="toast" class="fixed top-8 left-1/2 -translate-x-1/2 z-[150] px-8 py-4 rounded-2xl bg-white text-black font-bold shadow-2xl opacity-0 pointer-events-none transition-all duration-500">
    Added to your collection ✨
</div>

<header class="sticky top-0 z-40 px-6 py-5 glass">
    <div class="max-w-lg mx-auto flex justify-between items-center">
        <div>
            <h1 class="text-[10px] uppercase tracking-[0.4em] text-rose-400 font-black mb-1">Exclusive Boutique</h1>
            <p class="text-2xl font-black tracking-tighter">LUX<span class="text-rose-500">BAG</span></p>
        </div>
        <button onclick="showPage('cartPage')" class="relative p-3 bg-white/5 rounded-2xl border border-white/10">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="1.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
            <span id="cartCount" class="absolute -top-1 -right-1 bg-rose-500 text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full border-2 border-slate-900 hidden">0</span>
        </button>
    </div>
</header>

<main id="homePage" class="page-content active px-4 max-w-lg mx-auto">
    <div class="my-8 p-8 rounded-[2.5rem] bg-gradient-to-br from-rose-500/20 to-slate-900 border border-rose-500/20">
        <h2 class="text-3xl font-extrabold leading-tight">Artisan <br>Handcrafted</h2>
        <p class="text-rose-300/80 text-sm mt-2 font-medium">Limited Sale: Everything at ₹99</p>
    </div>

    <div class="grid grid-cols-2 gap-4" id="bagGrid"></div>
</main>

<div id="productModal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4 bg-slate-950/95 backdrop-blur-xl">
    <div class="modal-content w-full max-w-sm bg-slate-900 rounded-[3rem] overflow-hidden border border-white/10 shadow-3xl">
        <div class="relative">
            <button onclick="closeProductModal()" class="absolute top-6 right-6 z-10 p-2 bg-black/40 backdrop-blur-md rounded-full text-white">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
            <img id="modalImg" src="" class="w-full aspect-square object-cover" alt="Preview">
        </div>
        <div class="p-8">
            <h3 id="modalName" class="text-2xl font-bold text-white mb-2"></h3>
            <p class="text-slate-400 text-sm leading-relaxed mb-6">Handmade with premium materials, this artisan piece represents the pinnacle of craft and style.</p>
            <div class="flex items-center justify-between mb-8">
                <span class="text-3xl font-black text-rose-500">₹99</span>
                <span class="px-3 py-1 bg-rose-500/10 text-rose-500 text-xs font-bold rounded-full">Limited Stock</span>
            </div>
            <button id="modalAddBtn" class="w-full btn-premium py-5 rounded-2xl font-bold text-lg uppercase tracking-widest shadow-xl">
                Add to Bag
            </button>
        </div>
    </div>
</div>

<div id="cartPage" class="page-content px-6 max-w-lg mx-auto">
    <div class="flex items-center gap-4 my-8">
        <button onclick="showPage('homePage')" class="p-3 bg-white/5 rounded-2xl border border-white/10">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        </button>
        <h2 class="text-2xl font-bold">Your Bag</h2>
    </div>
    <div id="cartList" class="space-y-4"></div>
    <div id="emptyCart" class="text-center py-20 hidden">Empty Bag</div>
    <div id="cartSummary" class="mt-8 p-8 rounded-3xl bg-slate-900 border border-white/10 hidden">
        <div class="flex justify-between items-center mb-6">
            <span class="text-slate-400">Total</span>
            <span id="cartTotal" class="text-3xl font-black text-rose-500">₹0</span>
        </div>
        <button onclick="showPage('checkoutPage')" class="w-full btn-premium py-5 rounded-2xl font-bold">Checkout Now</button>
    </div>
</div>

<div id="checkoutPage" class="page-content px-6 max-w-lg mx-auto">
    <h2 class="text-2xl font-bold my-8">Delivery</h2>
    <form onsubmit="handlePayment(event)" class="space-y-4">
        <input type="text" placeholder="Full Name" required class="w-full bg-slate-900 border border-white/10 p-5 rounded-2xl outline-none">
        <input type="tel" placeholder="Phone" required class="w-full bg-slate-900 border border-white/10 p-5 rounded-2xl outline-none">
        <textarea placeholder="Address" required class="w-full bg-slate-900 border border-white/10 p-5 rounded-2xl outline-none"></textarea>
        <button type="submit" class="w-full btn-premium py-5 rounded-2xl font-bold">Pay with UPI</button>
    </form>
</div>

<div id="qrModal" class="modal fixed inset-0 z-[100] hidden items-center justify-center p-6 bg-black/95 backdrop-blur-xl">
    <div class="bg-slate-900 p-10 rounded-[3rem] text-center w-full max-w-sm">
        <h3 class="text-xl font-bold mb-6">Scan to Pay</h3>
        <img src="1000001796.png" class="w-48 h-48 mx-auto bg-white p-4 rounded-3xl mb-6">
        <input type="file" id="fileInp" class="hidden" onchange="handleUpload(this)">
        <button onclick="document.getElementById('fileInp').click()" class="w-full border-2 border-dashed border-slate-700 py-4 rounded-2xl text-sm mb-4">Upload Screenshot</button>
        <button id="doneBtn" onclick="showSuccess()" class="w-full py-5 bg-emerald-500 rounded-2xl font-bold opacity-30 pointer-events-none">I Have Paid</button>
    </div>
</div>

<div id="successPage" class="fixed inset-0 z-[200] bg-slate-950 hidden flex-col items-center justify-center text-center p-8">
    <h2 class="text-4xl font-black mb-4">Order Received!</h2>
    <button onclick="location.reload()" class="text-rose-500 font-bold uppercase tracking-widest">Back to Shop</button>
</div>

<nav class="fixed bottom-0 left-0 right-0 glass py-5 px-12 flex justify-around items-center z-40 rounded-t-[2.5rem]">
    <button onclick="showPage('homePage')" class="text-rose-500"><svg class="w-7 h-7" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/></svg></button>
    <button onclick="showPage('cartPage')" class="text-slate-500"><svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg></button>
</nav>

<script>
    const bagData = Array.from({length: 19}, (_, i) => ({
        id: i + 1,
        name: `Signature Collection 0${i + 1}`,
        price: 99,
        image: `bag${i + 1}.png`
    }));

    let cart = [];

    function renderBags() {
        const grid = document.getElementById('bagGrid');
        grid.innerHTML = bagData.map(bag => `
            <div class="product-card p-3">
                <div class="overflow-hidden rounded-2xl mb-3" onclick="openProductModal(${bag.id})">
                    <img src="${bag.image}" class="w-full aspect-square object-cover" onerror="this.src='https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=400'">
                </div>
                <div class="px-1">
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-tighter truncate">${bag.name}</h3>
                    <div class="flex justify-between items-center mt-2">
                        <span class="text-rose-500 font-black">₹${bag.price}</span>
                        <button onclick="addToCart(${bag.id})" class="w-8 h-8 flex items-center justify-center bg-rose-500/10 text-rose-500 rounded-lg">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M12 4v16m8-8H4"/></svg>
                        </button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function openProductModal(id) {
        const bag = bagData.find(b => b.id === id);
        document.getElementById('modalImg').src = bag.image;
        document.getElementById('modalName').innerText = bag.name;
        document.getElementById('modalAddBtn').onclick = () => {
            addToCart(id);
            closeProductModal();
        };
        document.getElementById('productModal').classList.replace('hidden', 'flex');
    }

    function closeProductModal() {
        document.getElementById('productModal').classList.replace('flex', 'hidden');
    }

    function showPage(pageId) {
        document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        window.scrollTo(0,0);
    }

    function addToCart(id) {
        const product = bagData.find(b => b.id === id);
        cart.push(product);
        updateCartUI();
        const t = document.getElementById('toast');
        t.style.opacity = '1'; t.style.transform = 'translate(-50%, 20px)';
        setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translate(-50%, 0)'; }, 2000);
    }

    function updateCartUI() {
        const count = document.getElementById('cartCount');
        count.innerText = cart.length;
        count.classList.toggle('hidden', cart.length === 0);
        
        const list = document.getElementById('cartList');
        if (cart.length === 0) {
            document.getElementById('emptyCart').classList.remove('hidden');
            document.getElementById('cartSummary').classList.add('hidden');
            list.innerHTML = '';
        } else {
            document.getElementById('emptyCart').classList.add('hidden');
            document.getElementById('cartSummary').classList.remove('hidden');
            list.innerHTML = cart.map((item, i) => `
                <div class="flex items-center gap-4 bg-slate-900 p-4 rounded-3xl border border-white/5">
                    <img src="${item.image}" class="w-16 h-16 rounded-xl object-cover" onerror="this.src='https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=100'">
                    <div class="flex-grow"><h4 class="font-bold text-sm">${item.name}</h4><p class="text-rose-500 font-bold">₹${item.price}</p></div>
                    <button onclick="removeFromCart(${i})" class="p-2 text-slate-500">✕</button>
                </div>
            `).join('');
        }
        const total = cart.reduce((s, i) => s + i.price, 0);
        document.getElementById('cartTotal').innerText = `₹${total}`;
    }

    function removeFromCart(i) { cart.splice(i, 1); updateCartUI(); }
    function handlePayment(e) { e.preventDefault(); document.getElementById('qrModal').classList.replace('hidden', 'flex'); }
    function handleUpload() { document.getElementById('doneBtn').classList.remove('opacity-30', 'pointer-events-none'); }
    function showSuccess() { document.getElementById('qrModal').classList.add('hidden'); document.getElementById('successPage').classList.replace('hidden', 'flex'); }

    renderBags();
</script>
</body>
</html>
