 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LuxBag | Premium Handmade Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f472b6; --bg-dark: #0f172a; }
        body { background-color: var(--bg-dark); color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* Skeleton Shimmer Effect */
        .skeleton {
            background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .glass { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .product-card { background: #1e293b; border-radius: 24px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); overflow: hidden; border: 1px solid rgba(255,255,255,0.03); }
        .product-card:active { transform: scale(0.95); }
        .btn-pink { background: linear-gradient(135deg, #f472b6 0%, #db2777 100%); transition: opacity 0.2s; }
        .btn-pink:active { opacity: 0.8; }
        
        .page-content { display: none; }
        .page-content.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        input, textarea { background: rgba(255,255,255,0.05) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; }
        input:focus, textarea:focus { border-color: #f472b6 !important; }
    </style>
</head>
<body class="pb-24">

    <div class="bg-pink-600 text-white text-[10px] font-bold py-2 text-center uppercase tracking-[0.2em] sticky top-0 z-[60]">
        ⚡ Flash Sale Ends In: <span id="timer">15:00</span> ⚡
    </div>

    <header class="sticky top-[30px] z-50 px-4 py-4 glass">
        <div class="flex justify-between items-center max-w-md mx-auto">
            <div>
                <p class="text-[10px] uppercase tracking-widest text-pink-400 font-bold">Handmade</p>
                <h1 class="text-xl font-extrabold tracking-tighter">LUX<span class="text-pink-500">BAG</span></h1>
            </div>
            <button onclick="showPage('cartPage')" class="relative p-2.5 bg-white/5 rounded-full border border-white/10">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
                <span id="cartCount" class="absolute -top-1 -right-1 bg-pink-500 text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full hidden border-2 border-slate-900">0</span>
            </button>
        </div>
    </header>

    <main id="homePage" class="page-content active px-4 mt-6 max-w-md mx-auto">
        <div class="grid grid-cols-2 gap-4" id="bagGrid">
            <div class="product-card p-3"><div class="skeleton h-44 rounded-2xl mb-3"></div><div class="skeleton h-4 w-2/3 mb-2"></div><div class="skeleton h-4 w-1/4"></div></div>
            <div class="product-card p-3"><div class="skeleton h-44 rounded-2xl mb-3"></div><div class="skeleton h-4 w-2/3 mb-2"></div><div class="skeleton h-4 w-1/4"></div></div>
            <div class="product-card p-3"><div class="skeleton h-44 rounded-2xl mb-3"></div><div class="skeleton h-4 w-2/3 mb-2"></div><div class="skeleton h-4 w-1/4"></div></div>
            <div class="product-card p-3"><div class="skeleton h-44 rounded-2xl mb-3"></div><div class="skeleton h-4 w-2/3 mb-2"></div><div class="skeleton h-4 w-1/4"></div></div>
        </div>
    </main>

    <div id="cartPage" class="page-content px-6 max-w-md mx-auto">
        <div class="flex items-center gap-4 my-8">
            <button onclick="showPage('homePage')" class="p-2 bg-white/5 rounded-full">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            </button>
            <h2 class="text-2xl font-bold">Shopping Bag</h2>
        </div>
        <div id="cartList" class="space-y-4"></div>
        <div id="emptyCart" class="text-center py-20 hidden">
            <p class="text-slate-500 mb-4">Your bag is empty...</p>
            <button onclick="showPage('homePage')" class="text-pink-500 font-bold underline">Shop Collection</button>
        </div>
        <div id="cartSummary" class="mt-8 p-6 rounded-[2rem] bg-white/5 border border-white/10 hidden">
            <div class="flex justify-between items-center mb-6">
                <span class="text-slate-400">Total Amount</span>
                <span id="cartTotal" class="text-2xl font-bold text-pink-500">₹0</span>
            </div>
            <button onclick="showPage('checkoutPage')" class="w-full btn-pink py-4 rounded-2xl font-bold text-lg shadow-lg shadow-pink-500/20">Checkout</button>
        </div>
    </div>

    <div id="checkoutPage" class="page-content px-6 max-w-md mx-auto">
        <h2 class="text-2xl font-bold my-8">Delivery Details</h2>
        <form onsubmit="handlePayment(event)" class="space-y-4">
            <input type="text" id="custName" placeholder="Full Name" required class="w-full p-4 rounded-2xl outline-none">
            <input type="tel" id="custPhone" placeholder="Mobile Number" required class="w-full p-4 rounded-2xl outline-none">
            <textarea id="custAddr" placeholder="Complete Address (House no, Street, Pincode)" rows="4" required class="w-full p-4 rounded-2xl outline-none"></textarea>
            <button type="submit" class="w-full btn-pink py-4 rounded-2xl font-bold text-lg mt-4">Confirm & Pay</button>
        </form>
    </div>

    <div id="qrModal" class="fixed inset-0 z-[100] hidden items-center justify-center p-6 bg-black/95 backdrop-blur-sm">
        <div class="bg-slate-900 border border-white/10 p-8 rounded-[2.5rem] w-full max-w-sm text-center">
            <h3 class="text-xl font-bold mb-2">Scan to Pay</h3>
            <p id="payAmount" class="text-pink-500 text-3xl font-black mb-6">₹99</p>
            <div class="bg-white p-3 rounded-2xl inline-block mb-6">
                <img src="1000001796.png" class="w-44 h-44" alt="UPI QR">
            </div>
            <p class="text-[10px] text-slate-500 uppercase tracking-widest mb-4">Verification Required</p>
            <label class="block cursor-pointer group">
                <div class="border-2 border-dashed border-slate-700 group-hover:border-pink-500 py-4 rounded-2xl transition-all">
                    <span id="upText" class="text-xs font-bold text-slate-400">UPLOAD SCREENSHOT</span>
                </div>
                <input type="file" class="hidden" onchange="enablePaidBtn()">
            </label>
            <button id="finalPaidBtn" onclick="sendWhatsApp()" class="w-full mt-6 py-4 bg-green-600 rounded-2xl font-bold opacity-30 pointer-events-none transition-all">I HAVE PAID</button>
            <button onclick="document.getElementById('qrModal').classList.add('hidden')" class="mt-4 text-slate-500 text-xs">Cancel</button>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 glass border-t border-white/5 py-4 px-10 flex justify-around items-center z-40">
        <button onclick="showPage('homePage')" class="text-pink-500"><svg class="w-7 h-7" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/></svg></button>
        <button onclick="showPage('cartPage')" class="text-slate-500"><svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg></button>
    </nav>

    <script>
        const YOUR_PHONE_NUMBER = "919118886511"; 
        let cart = [];
        const products = Array.from({length: 15}, (_, i) => ({
            id: i + 1,
            name: `Aura Handmade Bag 0${i + 1}`,
            price: 99,
            img: `bag${i + 1}.png`
        }));

        // 1. Flash Sale Timer (15 Minutes)
        let time = 900;
        const timerLabel = document.getElementById('timer');
        setInterval(() => {
            const m = Math.floor(time / 60);
            const s = time % 60;
            timerLabel.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
            if(time > 0) time--;
        }, 1000);

        // 2. Load Products with Skeleton Delay
        window.onload = () => {
            setTimeout(() => {
                const grid = document.getElementById('bagGrid');
                grid.innerHTML = products.map(p => `
                    <div class="product-card p-3">
                        <img src="${p.img}" class="w-full h-44 object-cover rounded-[1.2rem] mb-3" onerror="this.src='https://via.placeholder.com/300x400/1e293b/ffffff?text=Product'">
                        <div class="px-1">
                            <h3 class="text-[11px] font-bold text-slate-300 truncate uppercase tracking-tight">${p.name}</h3>
                            <div class="flex justify-between items-center mt-2">
                                <span class="font-bold text-pink-500">₹${p.price}</span>
                                <button onclick="addToCart(${p.id})" class="p-2 bg-pink-500/10 text-pink-500 rounded-xl">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M12 4v16m8-8H4"/></svg>
                                </button>
                            </div>
                        </div>
                    </div>
                `).join('');
            }, 1200); 
        };

        function showPage(id) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }

        function addToCart(id) {
            cart.push(products.find(p => p.id === id));
            updateUI();
        }

        function updateUI() {
            const count = document.getElementById('cartCount');
            count.innerText = cart.length;
            count.classList.toggle('hidden', cart.length === 0);
            
            const list = document.getElementById('cartList');
            if(cart.length === 0) {
                document.getElementById('emptyCart').classList.remove('hidden');
                document.getElementById('cartSummary').classList.add('hidden');
                list.innerHTML = '';
            } else {
                document.getElementById('emptyCart').classList.add('hidden');
                document.getElementById('cartSummary').classList.remove('hidden');
                list.innerHTML = cart.map((item, idx) => `
                    <div class="flex items-center gap-4 bg-white/5 p-4 rounded-2xl border border-white/5">
                        <img src="${item.img}" class="w-16 h-16 rounded-xl object-cover">
                        <div class="flex-grow"><h4 class="font-bold text-sm">${item.name}</h4><p class="text-pink-500 font-bold">₹${item.price}</p></div>
                        <button onclick="cart.splice(${idx},1);updateUI()" class="text-slate-500 p-2">✕</button>
                    </div>
                `).join('');
            }
            const total = cart.length * 99;
            document.getElementById('cartTotal').innerText = `₹${total}`;
            document.getElementById('payAmount').innerText = `₹${total}`;
        }

        function handlePayment(e) {
            e.preventDefault();
            document.getElementById('qrModal').classList.remove('hidden');
            document.getElementById('qrModal').classList.add('flex');
        }

        function enablePaidBtn() {
            document.getElementById('upText').innerText = "✅ SCREENSHOT ATTACHED";
            document.getElementById('finalPaidBtn').classList.remove('opacity-30', 'pointer-events-none');
        }

        function sendWhatsApp() {
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;
            const addr = document.getElementById('custAddr').value;
            const itemDetails = cart.map((item, index) => `${index + 1}. ${item.name}`).join('%0A');
            const total = cart.length * 99;

            const message = `*📦 NAYE ORDER KI DETAIL* %0A%0A` +
                            `*Naam:* ${name}%0A` +
                            `*Mobile:* ${phone}%0A` +
                            `*Pata:* ${addr}%0A%0A` +
                            `*--- Items ---*%0A${itemDetails}%0A%0A` +
                            `*Total Amount:* ₹${total}%0A%0A` +
                            `_Maine payment kar di hai, screenshot upar hai._`;
            
            window.open(`https://wa.me/${YOUR_PHONE_NUMBER}?text=${message}`, '_blank');
            setTimeout(() => location.reload(), 1000);
        }
    </script>
</body>
</html>
